# Optional: from repo root, copy to compose.yaml and add a .env file with VITE_* and FIREBASE_SERVICE_ACCOUNT_JSON_HOST_PATH
#   cp deploy/docker/compose.example.yaml compose.yaml

services:
  two-do:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
        VITE_FIREBASE_MEASUREMENT_ID: ${VITE_FIREBASE_MEASUREMENT_ID:-}
    image: ${DOCKERHUB_USER:-yourdockerhubuser}/two-do:latest
    ports:
      - "80:80"
      - "8080:8080"
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/firebase.json
      AUTH_ALLOWED_ORIGINS: ${AUTH_ALLOWED_ORIGINS:-http://localhost,http://localhost:8080}
    volumes:
      - ${FIREBASE_SERVICE_ACCOUNT_JSON_HOST_PATH:?set path to JSON on host}:/run/secrets/firebase.json:ro
    init: true
