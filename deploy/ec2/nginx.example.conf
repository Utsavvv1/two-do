# Example: TLS + two SPAs + auth API on one EC2 host.
# Replace example.com, paths, and ssl_certificate_* before use.
#   sudo nginx -t && sudo systemctl reload nginx

# --- Auth API (Node on 127.0.0.1:8787) ---
server {
    listen 443 ssl http2;
    server_name auth.example.com;

    ssl_certificate     /etc/letsencrypt/live/auth.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auth.example.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- two·do SPA ---
server {
    listen 443 ssl http2;
    server_name todo.example.com;

    ssl_certificate     /etc/letsencrypt/live/todo.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/todo.example.com/privkey.pem;

    root /var/www/two-do;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json;
}

# --- companion SPA ---
server {
    listen 443 ssl http2;
    server_name companion.example.com;

    ssl_certificate     /etc/letsencrypt/live/companion.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/companion.example.com/privkey.pem;

    root /var/www/companion;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json;
}

# Optional: HTTP → HTTPS redirects (certbot often adds these separately)
