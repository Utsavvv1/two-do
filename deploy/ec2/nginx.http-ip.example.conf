# Place as /etc/nginx/conf.d/two-do.conf (Amazon Linux / Fedora-style layout).
# Remove any extra server { listen 80; ... } from /etc/nginx/nginx.conf after
# `include /etc/nginx/conf.d/*.conf;` so only this file owns port 80/8080.
# Replace YOUR_PUBLIC_IP with your Elastic IP.
#
# /auth-api/ reverse-proxies to Node on 127.0.0.1:8787 so browsers only need
# ports 80 and 8080 open (no public 8787). Build two-do with
# VITE_AUTH_API_URL=http://YOUR_PUBLIC_IP/auth-api and companion with
# VITE_AUTH_API_URL=http://YOUR_PUBLIC_IP:8080/auth-api (same path, own port).

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name YOUR_PUBLIC_IP;

    root /var/www/two-do;
    index index.html;

    location /auth-api/ {
        proxy_pass http://127.0.0.1:8787/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json;
}

server {
    listen 8080;
    listen [::]:8080;

    root /var/www/companion;
    index index.html;

    location /auth-api/ {
        proxy_pass http://127.0.0.1:8787/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json;
}
