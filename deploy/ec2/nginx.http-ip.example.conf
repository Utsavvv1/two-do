# Place as /etc/nginx/conf.d/two-do.conf (Amazon Linux / Fedora-style layout).
# Remove any extra server { listen 80; ... } from /etc/nginx/nginx.conf after
# `include /etc/nginx/conf.d/*.conf;` so only this file owns port 80/8080.
# Replace YOUR_PUBLIC_IP with your Elastic IP.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name YOUR_PUBLIC_IP;

    root /var/www/two-do;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json;
}

server {
    listen 8080;
    listen [::]:8080;

    root /var/www/companion;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json;
}
